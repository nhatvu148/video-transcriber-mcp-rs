name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: video-transcriber-mcp
            use_cross: false

          # macOS Apple Silicon - built locally due to whisper.cpp i8mm issue on GH runners
          # - os: macos-15
          #   target: aarch64-apple-darwin
          #   binary: video-transcriber-mcp
          #   use_cross: false

          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: video-transcriber-mcp
            use_cross: false

          # Linux ARM64 (cross-compile)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: video-transcriber-mcp
            use_cross: true

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: video-transcriber-mcp.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.binary }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.binary }}-${{ matrix.target }}.zip ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release-assets/ \;
          ls -lh release-assets/

      # Pull only the section for THIS tag out of CHANGELOG.md so the
      # GitHub release body isn't the whole file. Strips the `v` prefix
      # from the tag (e.g. `v0.7.0` → `0.7.0`) and matches the
      # `## [0.7.0]` heading, copying lines until the next `## [` heading.
      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Extracting section for v${VERSION}"
          # Substitute VERSION directly into the awk script body so the
          # bracket-anchored regex composes correctly. (Using `-v marker=`
          # turns out to mangle the escape sequences.)
          awk "/^## \\[${VERSION}\\]/ { capture=1; next } capture && /^## \\[/ { exit } capture" \
            CHANGELOG.md > release-notes.md
          # Strip leading + trailing blank lines for tidy rendering
          awk 'NF { p=1 } p' release-notes.md | awk 'BEGIN{RS=""; ORS="\n\n"} 1' > /tmp/rn && mv /tmp/rn release-notes.md
          # Fallback if no matching section was found
          if [ ! -s release-notes.md ]; then
            printf 'See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for release notes.\n' \
              "${GITHUB_REPOSITORY}" > release-notes.md
          fi
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
